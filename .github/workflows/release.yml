name: Release
on:
  push:
    tags:
      - v*

env:
  AMATSUBU_GITHUB_RELEASE: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  get_tag:
    name: Extract tag name
    runs-on: 'ubuntu-24.04'
    outputs:
      tag: ${{ steps.extract.outputs.tag }}

    steps:
      - name: Get tag name
        id: extract
        run: echo "tag=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT

  build:
    name: Build
    runs-on: 'ubuntu-24.04'
    needs: get_tag

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build
        run: ./gradlew assembleRelease -Pinclude-telemetry -Penable-updater
        env:
          storeFileBase64: ${{ secrets.SIGNING_KEY }}
          storePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyAlias: ${{ secrets.ALIAS }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          set -e

          mv app/build/outputs/apk/release/app-universal-release.apk amatsubu-${{ needs.get_tag.outputs.tag }}.apk
          mv app/build/outputs/apk/release/app-arm64-v8a-release.apk amatsubu-arm64-v8a-${{ needs.get_tag.outputs.tag }}.apk
          mv app/build/outputs/apk/release/app-armeabi-v7a-release.apk amatsubu-armeabi-v7a-${{ needs.get_tag.outputs.tag }}.apk
          mv app/build/outputs/apk/release/app-x86-release.apk amatsubu-x86-${{ needs.get_tag.outputs.tag }}.apk
          mv app/build/outputs/apk/release/app-x86_64-release.apk amatsubu-x86_64-${{ needs.get_tag.outputs.tag }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: amatsubu
          path: |
            amatsubu-${{ needs.get_tag.outputs.tag }}.apk
            amatsubu-arm64-v8a-${{ needs.get_tag.outputs.tag }}.apk
            amatsubu-armeabi-v7a-${{ needs.get_tag.outputs.tag }}.apk
            amatsubu-x86-${{ needs.get_tag.outputs.tag }}.apk
            amatsubu-x86_64-${{ needs.get_tag.outputs.tag }}.apk

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [get_tag, build]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - name: Delete all artifacts
        uses: geekyeggo/delete-artifact@176a747ab7e287e3ff4787bf8a148716375ca118 # v6.0.0
        with:
          failOnError: false
          name: amatsubu

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ needs.get_tag.outputs.tag }}
          name: Amatsubu ${{ needs.get_tag.outputs.tag }}
          body: |
            <!-->



            <!-->

            > [!TIP]
            >
            > ### If you are unsure which version to download then go with `amatsubu-${{ needs.get_tag.outputs.tag }}.apk`
          files: |
            amatsubu-${{ needs.get_tag.outputs.tag }}.apk
            amatsubu-arm64-v8a-${{ needs.get_tag.outputs.tag }}.apk
            amatsubu-armeabi-v7a-${{ needs.get_tag.outputs.tag }}.apk
            amatsubu-x86-${{ needs.get_tag.outputs.tag }}.apk
            amatsubu-x86_64-${{ needs.get_tag.outputs.tag }}.apk
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
