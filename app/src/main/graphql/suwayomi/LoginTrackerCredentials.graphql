mutation LoginTrackerCredentials($input: LoginTrackerCredentialsInput!) {
  loginTrackerCredentials(input: $input) {
    isLoggedIn
    tracker {
      id
      name
      icon
      isLoggedIn
      authUrl
      supportsTrackDeletion
      supportsReadingDates
      supportsPrivateTracking
      statuses {
        value
        name
      }
      scores
    }
  }
}
